version: "3"

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  api:
    build: ./api
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: orders
    ports:
      - "3306:3306"
